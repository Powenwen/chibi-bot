name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test || echo "No tests configured"

      - name: Build project
        run: bun run build

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get package.json version
        id: package_version
        run: |
          PKG_VERSION=$(cat package.json | grep '"version"' | head -1 | sed 's/.*: "//;s/",//')
          echo "package_version=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $PKG_VERSION"

      - name: Verify version match
        run: |
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          PKG_VERSION="${{ steps.package_version.outputs.package_version }}"
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          
          echo "Version verified: $TAG_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          echo "Generating changelog..."
          
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "First release"
            CHANGELOG="Initial release of Chibi-bot v${{ steps.get_version.outputs.version }}"
          else
            echo "Previous tag: $PREV_TAG"
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          fi
          
          # Save to file
          echo "$CHANGELOG" > CHANGELOG.txt
          
          echo "Changelog generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.txt
          draft: false
          prerelease: false
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-v${{ steps.get_version.outputs.version }}
          path: dist/
          retention-days: 90

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: create-release
    if: success()
    
    steps:
      - name: Release notification
        run: |
          echo "🎉 Release created successfully!"
          echo "Version: ${{ needs.create-release.outputs.version }}"
          echo "Check the releases page for details"
